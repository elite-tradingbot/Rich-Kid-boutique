<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RichKid Boutique | Elite Swimwear Jamaica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: black; color: white; font-family: 'Inter', sans-serif; }
        .gold-glow { filter: drop-shadow(0 0 12px rgba(234, 179, 8, 0.4)); }
        .product-card:hover { transform: translateY(-5px); transition: all 0.3s ease; }
    </style>
</head>
<body>

    <header class="sticky top-0 z-50 bg-black/95 backdrop-blur-md border-b border-zinc-900 py-6 px-4 text-center">
        <h1 class="text-4xl font-black text-yellow-500 tracking-tighter leading-none gold-glow">RICHKID</h1>
        <p class="text-[10px] tracking-[0.6em] text-zinc-500 font-bold uppercase mt-2">Boutique</p>
    </header>

    <section class="py-16 px-6 text-center">
        <h2 class="text-4xl md:text-6xl font-black mb-4 tracking-tighter uppercase italic">The Elite Collection</h2>
        <p class="text-zinc-500 max-w-md mx-auto text-xs font-bold tracking-widest uppercase">Premium 3-Piece Sets • $5,000 JMD</p>
    </section>

    <main class="max-w-7xl mx-auto p-4 pb-32 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        
        <div class="product-card bg-zinc-900 rounded-[2.5rem] overflow-hidden border border-zinc-800 shadow-2xl">
            <div class="h-[500px] bg-zinc-800"><img src="PASTE_BLUE_OMBRE_LINK_HERE" class="w-full h-full object-cover"></div>
            <div class="p-8">
                <h3 class="text-xl font-bold mb-1 uppercase tracking-tight">Deep Ocean Ombre 3-Piece</h3>
                <p class="text-yellow-500 text-2xl font-black mb-6">$5,000 JMD</p>
                <select id="size-1" class="w-full bg-black border border-zinc-700 p-4 rounded-2xl text-xs font-black mb-4 tracking-widest">
                    <option>SELECT SIZE (S, M, L, XL)</option>
                    <option>SMALL</option><option>MEDIUM</option><option>LARGE</option><option>XL</option>
                </select>
                <button onclick="order('Deep Ocean Ombre', '5000', '1')" class="w-full bg-white text-black py-5 rounded-2xl font-black tracking-widest hover:bg-yellow-500 transition-all">CONFIRM ORDER</button>
            </div>
        </div>

        <div class="product-card bg-zinc-900 rounded-[2.5rem] overflow-hidden border border-zinc-800 shadow-2xl">
            <div class="h-[500px] bg-zinc-800"><img src="PASTE_BROWN_CUTOUT_LINK_HERE" class="w-full h-full object-cover"></div>
            <div class="p-8">
                <h3 class="text-xl font-bold mb-1 uppercase tracking-tight">Island Spice Cut-Out Set</h3>
                <p class="text-yellow-500 text-2xl font-black mb-6">$5,000 JMD</p>
                <select id="size-2" class="w-full bg-black border border-zinc-700 p-4 rounded-2xl text-xs font-black mb-4 tracking-widest">
                    <option>SELECT SIZE</option><option>SMALL</option><option>MEDIUM</option><option>LARGE</option>
                </select>
                <button onclick="order('Island Spice Cut-Out', '5000', '2')" class="w-full bg-white text-black py-5 rounded-2xl font-black tracking-widest hover:bg-yellow-500 transition-all">CONFIRM ORDER</button>
            </div>
        </div>

        <div class="product-card bg-zinc-900 rounded-[2.5rem] overflow-hidden border border-zinc-800 shadow-2xl">
            <div class="h-[500px] bg-zinc-800"><img src="PASTE_BLACK_SHIMMER_LINK_HERE" class="w-full h-full object-cover"></div>
            <div class="p-8">
                <h3 class="text-xl font-bold mb-1 uppercase tracking-tight">Onyx Patent Shimmer Set</h3>
                <p class="text-yellow-500 text-2xl font-black mb-6">$5,000 JMD</p>
                <select id="size-3" class="w-full bg-black border border-zinc-700 p-4 rounded-2xl text-xs font-black mb-4 tracking-widest">
                    <option>SELECT SIZE</option><option>SMALL</option><option>MEDIUM</option><option>LARGE</option>
                </select>
                <button onclick="order('Onyx Patent Shimmer', '5000', '3')" class="w-full bg-white text-black py-5 rounded-2xl font-black tracking-widest hover:bg-yellow-500 transition-all">CONFIRM ORDER</button>
            </div>
        </div>

        </main>

    <footer class="py-12 border-t border-zinc-900 text-center">
        <p class="text-zinc-600 text-[10px] font-bold tracking-[0.5em] uppercase">Mandeville, Jamaica • 1-876-304-7407</p>
    </footer>

    <script>
        function order(name, price, id) {
            const size = document.getElementById('size-' + id).value;
            if(size.includes("SELECT")) { alert("Please select your size!"); return; }
            const msg = `Hi RichKid Boutique! ⚜️ I want to order the ${name} ($${price} JMD) in size ${size}. Is it in stock?`;
            window.open(`https://wa.me/18763047407?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
